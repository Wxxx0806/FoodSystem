server:
  port: 8080

spring:
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306
    username: root
    password: 123456
redis:
  host: localhost       # Redis 主机
  port: 6379            # Redis 端口
  password:              # 如果有密码就填写
  database: 0
  lettuce:
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 0
      max-wait: -1ms

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.FoodSystem.wx.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true



logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: wxzzhwxzzhwxzzhFoodSystemzzhwxzzhwxzzh
    # 设置jwt过期时间
    admin-ttl: 720000
    # 设置前端传递过来的令牌名称
    admin-token-name: token

# 文件上传配置
file:
  upload:
    # 文件上传路径（Windows系统）
    path: D:/FoodSystem/upload
    # 文件访问URL前缀
    url: http://localhost:8080/images
